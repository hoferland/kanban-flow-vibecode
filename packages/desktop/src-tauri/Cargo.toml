[package]
name = "app"
version = "0.1.0"
description = "Flow - Personal Kanban Board"
authors = ["you"]
license = ""
repository = ""
edition = "2021"

[build-dependencies]
tauri-build = { version = "1", features = [] }

[dependencies]
tauri = { version = "1", features = ["dialog-open", "dialog-save", "dialog-message", "fs-all", "path-all", "shell-open", "updater"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Figma sync server
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.5", features = ["cors"] }
tokio = { version = "1", features = ["full"] }
futures = "0.3"
once_cell = "1.19"
chrono = "0.4"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
